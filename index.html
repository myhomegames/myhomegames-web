<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#E5A00D" />
  <meta name="description" content="Self-hosted personal game library" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MyHomeGames" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <!-- Allow YouTube embeds to use compute-pressure; block for other origins -->
  <meta http-equiv="Permissions-Policy" content="compute-pressure=(self &quot;https://www.youtube.com&quot;)" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <title>MyHomeGames</title>
  <!-- Capture beforeinstallprompt before the module bundle loads (event often fires early). -->
  <script>
    (function () {
      var state = (window.__MHG_PWA__ = window.__MHG_PWA__ || {
        deferred: null,
        listeners: [],
      });
      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        state.deferred = event;
        for (var i = 0; i < state.listeners.length; i++) {
          try {
            state.listeners[i](event);
          } catch (_) {}
        }
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
